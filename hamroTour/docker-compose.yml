services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hamrotour}
      POSTGRES_USER: ${POSTGRES_USER:-hamrotour}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hamrotour}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: ${DATABASE_URL:-postgresql://hamrotour:hamrotour@db:5432/hamrotour}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      USE_S3: ${USE_S3:-0}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api}
    volumes:
      - backend_media:/app/media
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api}
    env_file:
      - ./.env
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_media:
